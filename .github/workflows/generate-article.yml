name: Generate Article

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit and push
        run: |
          git config user.name "BasketGuide Bot"
          git config user.email "bot@basketguide.fr"
          git add posts/
          git diff --staged --quiet || git commit -m "Nouvel article généré automatiquement"
          git push
